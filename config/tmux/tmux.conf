# change the prefix key
set-option -g prefix C-SPACE
unbind C-b
bind-key C-SPACE send-prefix

# status bar customization
# reposition the status bar
set -g status-position top
set -g status-justify absolute-centre
# make the bg blend
set -g status-style "bg=default"
# choose colors
set -g window-status-current-style "bold fg=red"
# show only the time
set -g status-right "%H:%M"
# show only session and increase the length
set -g status-left "#S"
set -g status-left-length 25

# change the color of the pane highlight
set -g pane-active-border-style "fg=red"

# colors
set -as terminal-features ",xterm-256color:RGB"

# options that were suggested by neovim
set -sg escape-time 10
set -g focus-events on

# enable extended keys
set -g extended-keys-format csi-u

# don't ask me if i want to kill the things
bind-key & kill-window
bind-key x kill-pane

# reload the config with a bind
bind-key C-r source-file "~/.config/tmux/tmux.conf"

# enable mouse support
set -g mouse on
