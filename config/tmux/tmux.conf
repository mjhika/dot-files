# -- ( Keymaps ) ---------------------------------------------------------------
set-option -g prefix C-SPACE
unbind C-b
bind-key C-SPACE send-prefix

# -- ( colors ) ---------------------------------------------------------------
set -as terminal-features ",xterm-256color:RGB"

# -- ( Status bar ) -----------------------------------------------------------
set -g status-position top
set -g status-justify absolute-centre
set -g status-style "bg=default"
set -g window-status-current-style "bold fg=red"
set -g status-right "%H:%M"
set -g status-left "#S"
set -g status-left-length 25

# change the color of the pane highlight
set -g pane-active-border-style "fg=red"

# options that were suggested by neovim
set -sg escape-time 10
set -g focus-events on

# enable extended keys
set -g extended-keys-format csi-u

# don't ask me if i want to kill the things
bind-key & kill-window
bind-key x kill-pane

# reload the config with a bind
bind-key C-r source-file "~/.config/tmux/tmux.conf"

# enable mouse support
set -g mouse on
